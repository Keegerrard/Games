<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Teachable Machine Image Model</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 30px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            padding: 40px;
            max-width: 800px;
            width: 100%;
            text-align: center;
        }

        .title {
            color: #667eea;
            font-size: 2.5rem;
            margin-bottom: 10px;
            font-weight: bold;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.1);
        }

        .subtitle {
            color: #666;
            font-size: 1.1rem;
            margin-bottom: 30px;
        }

        .start-btn {
            background: linear-gradient(135deg, #4ade80 0%, #22c55e 100%);
            color: white;
            border: none;
            padding: 18px 50px;
            font-size: 1.3rem;
            font-weight: bold;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 10px 25px rgba(74, 222, 128, 0.4);
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 30px;
        }

        .start-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 15px 35px rgba(74, 222, 128, 0.5);
        }

        .start-btn:active {
            transform: translateY(0);
        }

        .start-btn:disabled {
            background: #ccc;
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }

        .webcam-section {
            background: linear-gradient(135deg, #f3f4f6 0%, #e5e7eb 100%);
            border-radius: 20px;
            padding: 30px;
            margin-bottom: 30px;
            min-height: 280px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        .webcam-title {
            color: #667eea;
            font-size: 1.3rem;
            font-weight: bold;
            margin-bottom: 20px;
        }

        #webcam-container {
            border-radius: 15px;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
            background: #000;
        }

        #webcam-container canvas {
            display: block;
            border-radius: 15px;
        }

        .loading-text {
            color: #667eea;
            font-size: 1.1rem;
            font-style: italic;
        }

        .predictions-section {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border-radius: 20px;
            padding: 30px;
            color: white;
        }

        .predictions-title {
            font-size: 1.5rem;
            font-weight: bold;
            margin-bottom: 20px;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.2);
        }

        #label-container {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        #label-container > div {
            background: rgba(255, 255, 255, 0.2);
            padding: 15px 20px;
            border-radius: 15px;
            font-size: 1.1rem;
            font-weight: 600;
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: all 0.3s ease;
            backdrop-filter: blur(10px);
        }

        #label-container > div:hover {
            background: rgba(255, 255, 255, 0.3);
            transform: translateX(5px);
        }

        .prediction-class {
            flex: 1;
            text-align: left;
        }

        .prediction-value {
            background: rgba(255, 255, 255, 0.3);
            padding: 5px 15px;
            border-radius: 20px;
            font-weight: bold;
            min-width: 80px;
            text-align: center;
        }

        .status-indicator {
            display: inline-block;
            width: 12px;
            height: 12px;
            border-radius: 50%;
            background: #4ade80;
            animation: pulse 2s infinite;
            margin-right: 10px;
        }

        @keyframes pulse {
            0%, 100% {
                opacity: 1;
                transform: scale(1);
            }
            50% {
                opacity: 0.5;
                transform: scale(1.2);
            }
        }

        .info-box {
            background: rgba(74, 222, 128, 0.1);
            border: 2px solid rgba(74, 222, 128, 0.3);
            border-radius: 15px;
            padding: 15px;
            margin-top: 20px;
            color: #667eea;
            font-size: 0.9rem;
        }

        .emoji {
            font-size: 1.5rem;
            margin-right: 10px;
        }

        @media (max-width: 600px) {
            .container {
                padding: 25px;
            }

            .title {
                font-size: 2rem;
            }

            .start-btn {
                padding: 15px 35px;
                font-size: 1.1rem;
            }

            .webcam-section {
                padding: 20px;
            }

            .predictions-section {
                padding: 20px;
            }

            #label-container > div {
                flex-direction: column;
                gap: 10px;
                text-align: center;
            }

            .prediction-class {
                text-align: center;
            }
        }

        .hidden {
            display: none;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1 class="title">🤖 AI Image Recognition</h1>
        <p class="subtitle">Teachable Machine Image Model</p>

        <button type="button" class="start-btn" onclick="init()" id="startBtn">
            🚀 Start Camera
        </button>

        <div class="webcam-section">
            <div class="webcam-title">
                <span class="emoji">📸</span>Camera Feed
            </div>
            <div id="webcam-container">
                <p class="loading-text">Click "Start Camera" to begin...</p>
            </div>
        </div>

        <div class="predictions-section">
            <div class="predictions-title">
                <span class="status-indicator"></span>
                Predictions
            </div>
            <div id="label-container">
                <p style="color: rgba(255, 255, 255, 0.7);">Waiting for camera to start...</p>
            </div>
        </div>

        <div class="info-box">
            <strong>💡 Tip:</strong> Make sure to allow camera access when prompted. The AI will analyze the camera feed in real-time!
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@latest/dist/tf.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@teachablemachine/image@latest/dist/teachablemachine-image.min.js"></script>
    <script type="text/javascript">
        // More API functions here:
        // https://github.com/googlecreativelab/teachablemachine-community/tree/master/libraries/image

        // the link to your model provided by Teachable Machine export panel
        const URL = "https://teachablemachine.withgoogle.com/models/NuguaaUjt/";

        let model, webcam, labelContainer, maxPredictions;

        // Load the image model and setup the webcam
        async function init() {
            const startBtn = document.getElementById('startBtn');
            startBtn.disabled = true;
            startBtn.textContent = '⏳ Loading...';

            const modelURL = URL + "model.json";
            const metadataURL = URL + "metadata.json";

            // load the model and metadata
            // Refer to tmImage.loadFromFiles() in the API to support files from a file picker
            // or files from your local hard drive
            // Note: the pose library adds "tmImage" object to your window (window.tmImage)
            model = await tmImage.load(modelURL, metadataURL);
            maxPredictions = model.getTotalClasses();

            // Convenience function to setup a webcam
            const flip = true; // whether to flip the webcam
            webcam = new tmImage.Webcam(200, 200, flip); // width, height, flip
            await webcam.setup(); // request access to the webcam
            await webcam.play();
            window.requestAnimationFrame(loop);

            // append elements to the DOM
            const webcamContainer = document.getElementById("webcam-container");
            webcamContainer.innerHTML = ''; // Clear loading text
            webcamContainer.appendChild(webcam.canvas);
            
            labelContainer = document.getElementById("label-container");
            labelContainer.innerHTML = ''; // Clear waiting message
            
            for (let i = 0; i < maxPredictions; i++) { // and class labels
                const div = document.createElement("div");
                div.innerHTML = `
                    <span class="prediction-class">Class ${i + 1}</span>
                    <span class="prediction-value">0%</span>
                `;
                labelContainer.appendChild(div);
            }

            startBtn.textContent = '✅ Camera Active';
        }

        async function loop() {
            webcam.update(); // update the webcam frame
            await predict();
            window.requestAnimationFrame(loop);
        }

        // run the webcam image through the image model
        async function predict() {
            // predict can take in an image, video or canvas html element
            const prediction = await model.predict(webcam.canvas);
            for (let i = 0; i < maxPredictions; i++) {
                const probability = (prediction[i].probability * 100).toFixed(1);
                labelContainer.childNodes[i].innerHTML = `
                    <span class="prediction-class">${prediction[i].className}</span>
                    <span class="prediction-value">${probability}%</span>
                `;
            }
        }
    </script>
</body>
</html>
