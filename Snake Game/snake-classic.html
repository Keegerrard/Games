  <!DOCTYPE html>
  <html lang="en">
    <head>
      <meta charset="UTF-8" />
      <meta name="viewport" content="width=device-width, initial-scale=1.0" />
      <title>Classic Snake Game</title>
      <link rel="stylesheet" href="../shared/game-shell.css" />
      <link rel="stylesheet" href="../shared/pro-ui.css" />
      <style>
        /* Complete isolation from WordPress styles */
        .snake-game-wrapper {
          all: initial;
          font-family: "Courier New", monospace;
          background: linear-gradient(135deg, #232526 0%, #414345 100%);
          min-height: 100vh;
          display: flex;
          align-items: center;
          justify-content: center;
          padding: 20px;
          margin: 0;
          box-sizing: border-box;
          position: relative;
          width: 100%;
        }

        .snake-game-wrapper * {
          box-sizing: border-box;
        }

        .snake-game-wrapper .snake-container {
          background: rgba(30, 30, 30, 0.95);
          border-radius: 20px;
          box-shadow: 0 20px 40px rgba(0, 0, 0, 0.5);
          padding: 30px 40px;
          display: flex;
          flex-direction: column;
          align-items: center;
          gap: 20px;
          max-width: 95%;
          width: auto;
        }

        .snake-game-wrapper .game-title {
          color: #00ff99;
          font-size: 2.5rem;
          text-shadow: 0 2px 8px #000;
          margin: 0 0 10px 0;
          letter-spacing: 2px;
          font-weight: bold;
          text-align: center;
        }

        .snake-game-wrapper .score {
          color: #fff;
          font-size: 1.2rem;
          margin: 0 0 10px 0;
          background: #222;
          padding: 8px 20px;
          border-radius: 10px;
          box-shadow: 0 2px 8px #000;
          text-align: center;
        }

        .snake-game-wrapper #snake-canvas {
          background: #111;
          border: 6px solid #00ff99;
          border-radius: 12px;
          box-shadow: 0 8px 32px #000;
          display: block;
        }

        .snake-game-wrapper .controls {
          color: #fff;
          font-size: 1rem;
          margin: 10px 0 0 0;
          text-align: center;
          background: #222;
          padding: 10px 20px;
          border-radius: 10px;
          box-shadow: 0 2px 8px #000;
          line-height: 1.4;
        }

        .snake-game-wrapper .snake-btn {
          background: linear-gradient(45deg, #00ff99, #00bfff);
          color: #222;
          font-weight: bold;
          border: none;
          border-radius: 8px;
          padding: 10px 24px;
          font-size: 1.1rem;
          margin: 10px 0;
          cursor: pointer;
          box-shadow: 0 2px 8px #000;
          transition: all 0.2s;
          font-family: inherit;
        }

        .snake-game-wrapper .snake-btn:hover {
          background: linear-gradient(45deg, #00bfff, #00ff99);
          color: #fff;
          transform: translateY(-1px);
        }

        .snake-game-wrapper .snake-btn:active {
          transform: translateY(0);
        }

        /* Mobile responsive */
        @media (max-width: 768px) {
          .snake-game-wrapper {
            padding: 10px;
            min-height: 100vh;
          }

          .snake-game-wrapper .snake-container {
            padding: 20px 15px;
            gap: 15px;
          }

          .snake-game-wrapper .game-title {
            font-size: 1.8rem;
            letter-spacing: 1px;
          }

          .snake-game-wrapper .score {
            font-size: 1rem;
            padding: 6px 15px;
          }

          .snake-game-wrapper #snake-canvas {
            width: 300px !important;
            height: 300px !important;
            max-width: 90vw;
            max-height: 90vw;
          }

          .snake-game-wrapper .controls {
            font-size: 0.9rem;
            padding: 8px 15px;
          }
        }

        @media (max-width: 480px) {
          .snake-game-wrapper .game-title {
            font-size: 1.5rem;
          }

          .snake-game-wrapper #snake-canvas {
            width: 250px !important;
            height: 250px !important;
          }

          .snake-game-wrapper .snake-btn {
            padding: 8px 20px;
            font-size: 1rem;
          }
        }

        /* Game over overlay animation */
        .snake-game-wrapper .game-over-overlay {
          animation: fadeInSnake 0.5s ease-in;
        }

        @keyframes fadeInSnake {
          from {
            opacity: 0;
          }
          to {
            opacity: 1;
          }
        }
      </style>
    </head>
    <body data-game-name="Snake Classic">
      <div class="snake-game-wrapper">
        <div class="snake-container">
          <h1 class="game-title">🐍 Classic Snake</h1>
          <div class="score" id="snake-score">Score: 0</div>
          <canvas id="snake-canvas" width="400" height="400"></canvas>
          <button class="snake-btn" id="snake-restart-btn">
            🔄 Restart Game
          </button>
          <div class="controls">
            <strong>Controls:</strong> Arrow Keys or WASD<br />
            <span style="font-size: 0.9em; opacity: 0.8">
              Eat the green pixel to grow. Don't hit the walls or yourself!
            </span>
          </div>
        </div>
      </div>

      <script>
        (function () {
          "use strict";

          class SnakeGameIsolated {
            constructor() {
              this.canvas = document.getElementById("snake-canvas");
              this.ctx = this.canvas.getContext("2d");
              this.scoreEl = document.getElementById("snake-score");
              this.restartBtn = document.getElementById("snake-restart-btn");

              // Game settings
              this.gridSize = 20;
              this.tileCount = this.canvas.width / this.gridSize;

              this.initGame();
              this.bindEvents();
            }

            initGame() {
              this.snake = [{ x: 10, y: 10 }];
              this.direction = { x: 0, y: 0 };
              this.nextDirection = { x: 0, y: 0 };
              this.food = this.randomFood();
              this.score = 0;
              this.gameOver = false;
              this.moveInterval = 150; // ms
              this.lastMoveTime = 0;

              this.scoreEl.textContent = "Score: 0";
              this.restartBtn.style.display = "none";

              requestAnimationFrame((time) => this.gameLoop(time));
            }

            bindEvents() {
              // Keyboard controls
              document.addEventListener("keydown", (e) => this.handleKeyPress(e));

              // Restart button
              this.restartBtn.addEventListener("click", () => this.resetGame());

              // Touch controls for mobile
              let touchStartX = 0;
              let touchStartY = 0;

              this.canvas.addEventListener(
                "touchstart",
                (e) => {
                  e.preventDefault();
                  const touch = e.touches[0];
                  touchStartX = touch.clientX;
                  touchStartY = touch.clientY;
                },
                { passive: false }
              );

              this.canvas.addEventListener(
                "touchend",
                (e) => {
                  e.preventDefault();
                  if (this.gameOver) return;

                  const touch = e.changedTouches[0];
                  const touchEndX = touch.clientX;
                  const touchEndY = touch.clientY;

                  const deltaX = touchEndX - touchStartX;
                  const deltaY = touchEndY - touchStartY;
                  const minSwipeDistance = 30;

                  if (Math.abs(deltaX) > Math.abs(deltaY)) {
                    if (Math.abs(deltaX) > minSwipeDistance) {
                      if (deltaX > 0 && this.direction.x !== -1) {
                        this.nextDirection = { x: 1, y: 0 };
                      } else if (deltaX < 0 && this.direction.x !== 1) {
                        this.nextDirection = { x: -1, y: 0 };
                      }
                    }
                  } else {
                    if (Math.abs(deltaY) > minSwipeDistance) {
                      if (deltaY > 0 && this.direction.y !== -1) {
                        this.nextDirection = { x: 0, y: 1 };
                      } else if (deltaY < 0 && this.direction.y !== 1) {
                        this.nextDirection = { x: 0, y: -1 };
                      }
                    }
                  }
                },
                { passive: false }
              );
            }

            handleKeyPress(e) {
              if (this.gameOver) return;

              switch (e.key.toLowerCase()) {
                case "arrowup":
                case "w":
                  if (this.direction.y === 1) break;
                  this.nextDirection = { x: 0, y: -1 };
                  e.preventDefault();
                  break;
                case "arrowdown":
                case "s":
                  if (this.direction.y === -1) break;
                  this.nextDirection = { x: 0, y: 1 };
                  e.preventDefault();
                  break;
                case "arrowleft":
                case "a":
                  if (this.direction.x === 1) break;
                  this.nextDirection = { x: -1, y: 0 };
                  e.preventDefault();
                  break;
                case "arrowright":
                case "d":
                  if (this.direction.x === -1) break;
                  this.nextDirection = { x: 1, y: 0 };
                  e.preventDefault();
                  break;
              }
            }

            resetGame() {
              this.initGame();
            }

            randomFood() {
              let pos;
              do {
                pos = {
                  x: Math.floor(Math.random() * this.tileCount),
                  y: Math.floor(Math.random() * this.tileCount),
                };
              } while (
                this.snake.some((seg) => seg.x === pos.x && seg.y === pos.y)
              );
              return pos;
            }

            drawPixel(x, y, color) {
              this.ctx.fillStyle = color;
              this.ctx.fillRect(
                x * this.gridSize,
                y * this.gridSize,
                this.gridSize,
                this.gridSize
              );
            }

            drawSnake() {
              for (let i = 0; i < this.snake.length; i++) {
                this.drawPixel(
                  this.snake[i].x,
                  this.snake[i].y,
                  i === 0 ? "#00ff99" : "#00bfff"
                );
                // Retro pixel border
                this.ctx.strokeStyle = "#222";
                this.ctx.lineWidth = 2;
                this.ctx.strokeRect(
                  this.snake[i].x * this.gridSize,
                  this.snake[i].y * this.gridSize,
                  this.gridSize,
                  this.gridSize
                );
              }
            }

            drawFood() {
              this.drawPixel(this.food.x, this.food.y, "#39ff14");
              this.ctx.strokeStyle = "#222";
              this.ctx.lineWidth = 2;
              this.ctx.strokeRect(
                this.food.x * this.gridSize,
                this.food.y * this.gridSize,
                this.gridSize,
                this.gridSize
              );
            }

            drawGrid() {
              this.ctx.strokeStyle = "#333";
              this.ctx.lineWidth = 1;
              for (let i = 0; i < this.tileCount; i++) {
                this.ctx.beginPath();
                this.ctx.moveTo(i * this.gridSize, 0);
                this.ctx.lineTo(i * this.gridSize, this.canvas.height);
                this.ctx.stroke();

                this.ctx.beginPath();
                this.ctx.moveTo(0, i * this.gridSize);
                this.ctx.lineTo(this.canvas.width, i * this.gridSize);
                this.ctx.stroke();
              }
            }

            gameLoop(time) {
              if (this.gameOver) return;

              if (!this.lastMoveTime) this.lastMoveTime = time;

              if (time - this.lastMoveTime > this.moveInterval) {
                this.lastMoveTime = time;
                this.update();
              }

              this.render();
              requestAnimationFrame((time) => this.gameLoop(time));
            }

            update() {
              this.direction = this.nextDirection;
              if (this.direction.x === 0 && this.direction.y === 0) return;

              const newHead = {
                x: this.snake[0].x + this.direction.x,
                y: this.snake[0].y + this.direction.y,
              };

              // Wall collision
              if (
                newHead.x < 0 ||
                newHead.x >= this.tileCount ||
                newHead.y < 0 ||
                newHead.y >= this.tileCount
              ) {
                this.endGame();
                return;
              }

              // Self collision
              if (
                this.snake.some(
                  (seg) => seg.x === newHead.x && seg.y === newHead.y
                )
              ) {
                this.endGame();
                return;
              }

              this.snake.unshift(newHead);

              // Check food collision
              if (newHead.x === this.food.x && newHead.y === this.food.y) {
                this.score++;
                this.scoreEl.textContent = "Score: " + this.score;
                this.food = this.randomFood();
                this.moveInterval = Math.max(80, this.moveInterval - 2); // Speed up
              } else {
                this.snake.pop();
              }
            }

            render() {
              this.ctx.clearRect(0, 0, this.canvas.width, this.canvas.height);
              this.drawGrid();
              this.drawFood();
              this.drawSnake();
            }

            endGame() {
              this.gameOver = true;
              this.scoreEl.textContent = "Score: " + this.score + " - GAME OVER!";
              this.restartBtn.style.display = "inline-block";

              // Game over overlay
              this.ctx.save();
              this.ctx.globalAlpha = 0.8;
              this.ctx.fillStyle = "#f44336";
              this.ctx.fillRect(
                0,
                this.canvas.height / 2 - 60,
                this.canvas.width,
                120
              );

              this.ctx.globalAlpha = 1;
              this.ctx.fillStyle = "#fff";
              this.ctx.font = 'bold 24px "Courier New", monospace';
              this.ctx.textAlign = "center";
              this.ctx.fillText(
                "GAME OVER",
                this.canvas.width / 2,
                this.canvas.height / 2 - 10
              );

              this.ctx.font = '16px "Courier New", monospace';
              this.ctx.fillText(
                "Final Score: " + this.score,
                this.canvas.width / 2,
                this.canvas.height / 2 + 20
              );
              this.ctx.fillText(
                "Click Restart to play again",
                this.canvas.width / 2,
                this.canvas.height / 2 + 45
              );

              this.ctx.restore();
            }
          }

          // Initialize when DOM is ready
          if (document.readyState === "loading") {
            document.addEventListener("DOMContentLoaded", () => {
              new SnakeGameIsolated();
            });
          } else {
            new SnakeGameIsolated();
          }
        })();
      </script>
      <script src="../shared/game-shell.js"></script>
    </body>
  </html>
